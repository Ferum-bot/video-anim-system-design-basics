version: '3'

tasks:

  # ── Dev ──────────────────────────────────────────────────────────────────────

  serve:
    desc: "Запустить редактор анимации  (name=example по умолчанию)"
    summary: |
      Открывает motion-canvas редактор в браузере на http://localhost:9000

      Примеры:
        task serve
        task serve name=video-02
    vars:
      NAME: '{{.NAME | default "example"}}'
    preconditions:
      - sh: '[ -d "{{.NAME}}" ]'
        msg: "Папка '{{.NAME}}' не найдена. Создай её: task new name={{.NAME}}"
    cmds:
      - PATH=/opt/homebrew/bin:$PATH node_modules/.bin/vite {{.NAME}}

  build:
    desc: "Собрать анимацию в продакшн  (name=example по умолчанию)"
    vars:
      NAME: '{{.NAME | default "example"}}'
    preconditions:
      - sh: '[ -d "{{.NAME}}" ]'
        msg: "Папка '{{.NAME}}' не найдена."
    cmds:
      - PATH=/opt/homebrew/bin:$PATH node_modules/.bin/vite build {{.NAME}}

  install:
    desc: "Установить зависимости npm"
    cmds:
      - PATH=/opt/homebrew/bin:$PATH npm install

  # ── Export ───────────────────────────────────────────────────────────────────

  mov:
    desc: "PNG-кадры → lossless .mov с альфой (чёткий оверлей для CapCut, без артефактов)"
    summary: |
      Кодирует кадры в QuickTime Animation (qtrle): без потерь, RGB + альфа, без
      «ряби»/компрессионных артефактов на тексте и линиях. ~340 МБ за ~3-4 мин,
      в ~14× меньше ProRes. Старый универсальный кодек — CapCut читает надёжно.
      Перед рендером выстави TRANSPARENT = true в lib/stage.tsx.

      Примеры:
        task mov SRC='output/project' OUT=anim.mov
        task mov SRC=… OUT=… FPS=60        # переопределить частоту кадров
    vars:
      FPS: '{{.FPS | default "30"}}'
    preconditions:
      - sh: '[ -n "{{.SRC}}" ] && [ -n "{{.OUT}}" ]'
        msg: "Укажи SRC=папка_с_кадрами и OUT=файл.mov"
      - sh: '[ -d "{{.SRC}}" ]'
        msg: "Папка с кадрами '{{.SRC}}' не найдена"
    cmds:
      - PATH=/opt/homebrew/bin:$PATH ffmpeg -framerate {{.FPS}} -i '{{.SRC}}/%06d.png' -c:v qtrle -pix_fmt argb -y '{{.OUT}}'

  mov:small:
    desc: "PNG-кадры → HEVC 4:4:4 .mov с альфой (компактно ~100 МБ; если CapCut поддержит)"
    summary: |
      HEVC 4:4:4 (videotoolbox): почти как lossless по чёткости (4:4:4, без мыла на
      цветном тексте), но в ~3× меньше qtrle. Совместимость зависит от версии CapCut —
      если прозрачность/формат не подхватятся, используй обычный `task mov` (qtrle).

      Пример:
        task mov:small SRC='output/project' OUT=anim.mov
    vars:
      FPS: '{{.FPS | default "30"}}'
      ALPHAQ: '{{.ALPHAQ | default "1.0"}}'
    preconditions:
      - sh: '[ -n "{{.SRC}}" ] && [ -n "{{.OUT}}" ]'
        msg: "Укажи SRC=папка_с_кадрами и OUT=файл.mov"
      - sh: '[ -d "{{.SRC}}" ]'
        msg: "Папка с кадрами '{{.SRC}}' не найдена"
    cmds:
      - PATH=/opt/homebrew/bin:$PATH ffmpeg -framerate {{.FPS}} -i '{{.SRC}}/%06d.png' -c:v hevc_videotoolbox -alpha_quality {{.ALPHAQ}} -pix_fmt ayuv -tag:v hvc1 -y '{{.OUT}}'

  # ── [01] You don't need sharding ─────────────────────────────────────────────

  serve:sharding:
    desc: "Запустить редактор для видео [01] You don't need sharding"
    cmds:
      - task: serve
        vars:
          NAME: '[01_01]hardware-limits'

  build:sharding:
    desc: "Собрать анимацию для видео [01] You don't need sharding"
    cmds:
      - task: build
        vars:
          NAME: '[01_01]hardware-limits'

  # ── [02] Cache ───────────────────────────────────────────────────────────────

  serve:cache:
    desc: "Запустить редактор для части [02] Cache (отдельный рендер)"
    cmds:
      - task: serve
        vars:
          NAME: '[01_02]cache'

  build:cache:
    desc: "Собрать анимацию для части [02] Cache"
    cmds:
      - task: build
        vars:
          NAME: '[01_02]cache'

  # ── [03] Database ────────────────────────────────────────────────────────────

  serve:database:
    desc: "Запустить редактор для части [03] Database (отдельный рендер)"
    cmds:
      - task: serve
        vars:
          NAME: '[01_03]database'

  build:database:
    desc: "Собрать анимацию для части [03] Database"
    cmds:
      - task: build
        vars:
          NAME: '[01_03]database'

  # ── [04] Application servers ─────────────────────────────────────────────────

  serve:app:
    desc: "Запустить редактор для части [04] Application servers"
    cmds:
      - task: serve
        vars:
          NAME: '[01_04]app-servers'

  build:app:
    desc: "Собрать анимацию для части [04] Application servers"
    cmds:
      - task: build
        vars:
          NAME: '[01_04]app-servers'

  # ── [05] Message queue ───────────────────────────────────────────────────────

  serve:queue:
    desc: "Запустить редактор для части [05] Message queue (Kafka)"
    cmds:
      - task: serve
        vars:
          NAME: '[01_05]message-queue'

  build:queue:
    desc: "Собрать анимацию для части [05] Message queue"
    cmds:
      - task: build
        vars:
          NAME: '[01_05]message-queue'

  # ── Scaffold ─────────────────────────────────────────────────────────────────

  new:
    desc: "Создать новую анимацию  →  task new name=video-02"
    summary: |
      Создаёт папку с полным набором файлов:
        vite.config.ts, tsconfig.json,
        src/project.ts, src/env.d.ts, src/project.meta,
        src/scenes/intro.tsx  (стартовая сцена-заглушка)

      И добавляет скрипты serve:<name> / build:<name> в package.json.

      Пример:
        task new name=video-02
    vars:
      NAME: '{{.NAME}}'
    preconditions:
      - sh: '[ -n "{{.NAME}}" ]'
        msg: "Укажи имя папки: task new name=video-02"
      - sh: '[ ! -d "{{.NAME}}" ]'
        msg: "Папка '{{.NAME}}' уже существует"
    cmds:
      # ── Структура папок ──────────────────────────────────────────────────────
      - mkdir -p {{.NAME}}/src/scenes

      # ── vite.config.ts ───────────────────────────────────────────────────────
      - |
        cat > {{.NAME}}/vite.config.ts << 'EOF'
        import {defineConfig} from 'vite';
        import {createRequire} from 'module';
        import {dirname, resolve} from 'path';
        import {fileURLToPath} from 'url';

        const require = createRequire(import.meta.url);
        const motionCanvas = require('@motion-canvas/vite-plugin').default as any;

        const dir = dirname(fileURLToPath(import.meta.url));
        const repoRoot = resolve(dir, '..');

        export default defineConfig({
          root: dir,
          // Shared animation library lives at the repo root, reused by every video.
          resolve: {
            alias: {'@lib': resolve(repoRoot, 'lib')},
          },
          // Apply the Motion Canvas JSX runtime to every file, including the `@lib`
          // sources that live outside this project's root.
          esbuild: {
            jsx: 'automatic',
            jsxImportSource: '@motion-canvas/2d',
          },
          server: {
            fs: {allow: [repoRoot]},
          },
          plugins: [
            motionCanvas({project: `${dir}/src/project.ts`}),
          ],
        });
        EOF

      # ── tsconfig.json ────────────────────────────────────────────────────────
      - |
        cat > {{.NAME}}/tsconfig.json << 'EOF'
        {
          "extends": "../tsconfig.base.json",
          "compilerOptions": {
            "paths": {
              "@motion-canvas/2d/jsx-runtime": [
                "../node_modules/@motion-canvas/2d/lib/jsx-runtime"
              ],
              "@lib": ["../lib/index.ts"],
              "@lib/*": ["../lib/*"]
            }
          },
          "include": ["src", "../lib"]
        }
        EOF

      # ── src/project.meta ─────────────────────────────────────────────────────
      - |
        cat > {{.NAME}}/src/project.meta << 'EOF'
        {
          "version": 0,
          "shared": {
            "background": null,
            "range": [0, null],
            "size": {"x": 1920, "y": 1080},
            "audioOffset": 0
          },
          "preview": {
            "fps": 60,
            "resolutionScale": 2
          },
          "rendering": {
            "fps": 60,
            "resolutionScale": 1,
            "colorSpace": "srgb",
            "exporter": {
              "name": "@motion-canvas/core/image-sequence",
              "options": {
                "fileType": "image/png",
                "quality": 100,
                "groupByScene": false
              }
            }
          },
          "name": "{{.NAME}}"
        }
        EOF

      # ── src/env.d.ts ─────────────────────────────────────────────────────────
      - |
        cat > {{.NAME}}/src/env.d.ts << 'EOF'
        /// <reference types="@motion-canvas/core/types" />

        declare module '*?scene' {
          import type {FullSceneDescription} from '@motion-canvas/core';
          const scene: FullSceneDescription;
          export default scene;
        }

        // Audio assets (resolved to a URL by Vite) — used as the project narration track.
        declare module '*.m4a' { const src: string; export default src; }
        declare module '*.mp3' { const src: string; export default src; }
        declare module '*.wav' { const src: string; export default src; }

        // Image assets (resolved to a URL by Vite) — tech logos etc.
        declare module '*.svg' { const src: string; export default src; }
        declare module '*.png' { const src: string; export default src; }
        EOF

      # ── src/project.ts ───────────────────────────────────────────────────────
      - |
        cat > {{.NAME}}/src/project.ts << 'EOF'
        import {makeProject} from '@motion-canvas/core';
        import intro from './scenes/intro?scene';

        export default makeProject({
          scenes: [intro],
        });
        EOF

      # ── src/scenes/intro.tsx (стартовая заглушка) ────────────────────────────
      - |
        cat > {{.NAME}}/src/scenes/intro.tsx << 'EOF'
        import {makeScene2D, Rect, Txt} from '@motion-canvas/2d';
        import {
          all,
          createRef,
          easeOutElastic,
          easeInOutCubic,
          waitFor,
        } from '@motion-canvas/core';

        const C = {
          bg:   '#0f1117',
          main: '#3d5afe',
          text: '#e8eaf6',
        };

        export default makeScene2D(function* (view) {
          view.fill(C.bg);

          const box  = createRef<Rect>();
          const label = createRef<Txt>();

          view.add(
            <Rect
              ref={box}
              width={320}
              height={120}
              radius={16}
              fill={C.main}
              shadowColor={C.main}
              shadowBlur={30}
              scale={0}
            >
              <Txt
                ref={label}
                text={'Hello, world'}
                fontSize={28}
                fontFamily={'JetBrains Mono, monospace'}
                fill={C.text}
                opacity={0}
              />
            </Rect>,
          );

          yield* box().scale(1, 0.6, easeOutElastic);
          yield* label().opacity(1, 0.3, easeInOutCubic);
          yield* waitFor(1.5);
          yield* all(
            box().scale(0, 0.4, easeInOutCubic),
            label().opacity(0, 0.3, easeInOutCubic),
          );
        });
        EOF

      # ── Добавить скрипты в package.json ─────────────────────────────────────
      - |
        PATH=/opt/homebrew/bin:$PATH node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.scripts['serve:{{.NAME}}'] = 'vite {{.NAME}}';
          pkg.scripts['build:{{.NAME}}'] = 'vite build {{.NAME}}';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
        "

      - |
        echo ""
        echo "✓  Анимация '{{.NAME}}' создана!"
        echo "   Запуск: task serve name={{.NAME}}"
        echo ""
